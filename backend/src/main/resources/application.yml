server:
  port: 8080

spring:
  application:
    name: shoe-factory-assistant
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 120MB
  profiles:
    default: dev

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

app:
  file-storage:
    root-path: ${user.dir}/src/main/resources/files
